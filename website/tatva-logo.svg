<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="380" height="72" fill="none">
  <!-- Ring -->
  <circle cx="36" cy="36" r="26" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Three tricolor dots on ring -->
  <!-- Saffron: 270° → (36, 10) -->
  <circle cx="36" cy="10" r="7" fill="#FF9933"/>
  <!-- Green: 30° → (58.5, 49) -->
  <circle cx="58.5" cy="49" r="7" fill="#138808"/>
  <!-- Navy: 150° → (13.5, 49) -->
  <circle cx="13.5" cy="49" r="7" fill="#1A237E"/>
  <!-- Centre nucleus -->
  <circle cx="36" cy="36" r="5" fill="#1A237E"/>
  <circle cx="36" cy="36" r="2.5" fill="white"/>
  <!-- Wordmark -->
  <text x="82" y="30" font-family="'Inter', 'Arial', sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="#0F172A">TATVA</text>
  <text x="83" y="51" font-family="'Inter', 'Arial', sans-serif" font-size="11" font-weight="400" letter-spacing="2.5" fill="#64748B">PRODUCT LIFECYCLE MANAGEMENT</text>
  <!-- Subtle grey underline matching sidebar panel tone -->
  <line x1="83" y1="57" x2="372" y2="57" stroke="#CBD5E1" stroke-width="1" stroke-linecap="round"/>
</svg>
