<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 115" width="380" height="115" fill="none">
  <defs>
    <!-- Indian tricolor gradients -->
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!--  CHEMISTRY ATOM ICON  (tricolor themed)   -->
  <!--  Centre = (62, 57)                        -->
  <!-- ══════════════════════════════════════════ -->
  <g transform="translate(62,57)">

    <!-- Orbit 1 — Saffron (horizontal) -->
    <ellipse cx="0" cy="0" rx="44" ry="15"
             stroke="#FF9933" stroke-width="2.2" stroke-linecap="round"
             transform="rotate(0)" opacity="0.9"/>

    <!-- Orbit 2 — India Green (tilted 60°) -->
    <ellipse cx="0" cy="0" rx="44" ry="15"
             stroke="#138808" stroke-width="2.2" stroke-linecap="round"
             transform="rotate(60)" opacity="0.9"/>

    <!-- Orbit 3 — Ashoka Navy (tilted -60°) -->
    <ellipse cx="0" cy="0" rx="44" ry="15"
             stroke="#1A237E" stroke-width="2.2" stroke-linecap="round"
             transform="rotate(-60)" opacity="0.9"/>

    <!-- Electron: Saffron — right of horizontal orbit -->
    <circle cx="44" cy="0" r="6" fill="#FF9933" filter="url(#glow)"/>
    <circle cx="44" cy="0" r="3" fill="white" opacity="0.7"/>

    <!-- Electron: Green — bottom-left of 60° orbit  rotate(60°)·(44,0) = (22, 38.1) -->
    <circle cx="22" cy="38" r="6" fill="#138808" filter="url(#glow)"/>
    <circle cx="22" cy="38" r="3" fill="white" opacity="0.7"/>

    <!-- Electron: Navy — top-left of -60° orbit  rotate(-60°)·(44,0) = (22, -38.1) -->
    <circle cx="22" cy="-38" r="6" fill="#1A237E" filter="url(#glow)"/>
    <circle cx="22" cy="-38" r="3" fill="white" opacity="0.7"/>

    <!-- Nucleus -->
    <circle cx="0" cy="0" r="13" fill="url(#nucleusGrad)" stroke="#1A237E" stroke-width="1.5"/>
    <!-- Ashoka Chakra hint — 12-spoke wheel inside nucleus -->
    <g opacity="0.35" stroke="#1A237E" stroke-width="0.8">
      <line x1="-9" y1="0"   x2="9"  y2="0"/>
      <line x1="0"  y1="-9"  x2="0"  y2="9"/>
      <line x1="-6.4" y1="-6.4" x2="6.4" y2="6.4"/>
      <line x1="6.4"  y1="-6.4" x2="-6.4" y2="6.4"/>
      <line x1="-8"  y1="-3.4" x2="8"  y2="3.4"/>
      <line x1="-3.4" y1="-8" x2="3.4" y2="8"/>
    </g>
    <circle cx="0" cy="0" r="3.5" fill="#1A237E"/>

  </g>

  <!-- ══════════════════════════════════════════ -->
  <!--  WORDMARK                                  -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Vertical tricolor bar beside wordmark -->
  <rect x="128" y="18" width="4" height="22" rx="2" fill="#FF9933"/>
  <rect x="128" y="40" width="4" height="22" rx="2" fill="#138808"/>
  <rect x="128" y="62" width="4" height="10" rx="2" fill="#1A237E" opacity="0.6"/>

  <!-- TATVA -->
  <text
    x="140" y="52"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
    font-size="40"
    font-weight="900"
    letter-spacing="5"
    fill="#1A237E">TATVA</text>

  <!-- Thin saffron underline -->
  <rect x="140" y="58" width="218" height="2.5" rx="1.25" fill="#FF9933"/>

  <!-- Subtitle -->
  <text
    x="141" y="78"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="2.8"
    fill="#455A64">PRODUCT LIFECYCLE MANAGEMENT</text>

  <!-- Green baseline accent -->
  <rect x="140" y="88" width="218" height="1.5" rx="0.75" fill="#138808" opacity="0.5"/>

</svg>
