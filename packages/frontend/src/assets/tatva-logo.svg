<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" width="220" height="100">

  <!-- ── Icon (centred at 50,44, radius ~36) ─────────────────────────── -->
  <g transform="translate(50,44)">

    <!-- Green large sweep — bottom-left -->
    <path d="M 0,36
             C -30,30 -42,4 -28,-18
             C -18,-34 2,-40 18,-34
             C 6,-16 -2,8 0,36 Z"
          fill="#2E7D32"/>
    <!-- Leaf tip -->
    <path d="M 0,36 C -18,46 -36,40 -38,26 C -32,16 -16,18 0,36 Z"
          fill="#388E3C"/>

    <!-- Orange arc — top -->
    <path d="M 18,-34
             C 30,-54 54,-56 64,-40
             C 72,-26 68,-8 56,2
             C 42,-14 22,-30 18,-34 Z"
          fill="#E65100"/>
    <!-- Orange fin -->
    <path d="M 18,-34 L 6,-54 L 26,-44 Z" fill="#EF6C00"/>

    <!-- Gray/silver arc — right -->
    <path d="M 56,2
             C 72,14 74,38 58,50
             C 46,58 28,56 16,48
             C 32,36 48,20 56,2 Z"
          fill="#9E9E9E"/>

    <!-- Dark navy centre circle -->
    <circle cx="10" cy="10" r="18" fill="#1A237E"/>
    <!-- White ring -->
    <circle cx="10" cy="10" r="11" fill="white"/>
    <!-- Navy inner -->
    <circle cx="10" cy="10" r="6" fill="#1A237E"/>

    <!-- Small blue dot top-right -->
    <circle cx="62" cy="-18" r="7" fill="#1565C0"/>

  </g>

  <!-- ── TATVA wordmark ──────────────────────────────────────────────── -->
  <text
    x="112" y="92"
    font-family="'Arial Black', 'Franklin Gothic Heavy', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="30"
    letter-spacing="4"
    fill="#1A237E"
    text-anchor="middle">TATVA</text>

</svg>
